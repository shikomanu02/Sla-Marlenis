      --text:#e8eaf6;--muted:#7b82a8;--radius:14px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Inter",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    .header{background:linear-gradient(135deg,#1a1e30,#0f1322);border-bottom:1px solid var(--border);padding:20px 40px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .header-left{display:flex;align-items:center;gap:14px}
    .header-logo{width:40px;height:40px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
    .header-title h1{font-size:1.15rem;font-weight:700}
    .header-title p{font-size:.77rem;color:var(--muted)}
    .header-badges{display:flex;gap:8px;align-items:center}
    .hbadge{padding:5px 14px;border-radius:8px;font-size:.75rem;font-weight:600;border:1px solid}
    .hbadge-green{background:rgba(0,212,170,.12);border-color:rgba(0,212,170,.35);color:var(--accent2)}
    .hbadge-purple{background:rgba(108,99,255,.12);border-color:rgba(108,99,255,.35);color:var(--accent)}
    .btn-export{background:var(--accent);color:#fff;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-weight:700;font-family:inherit}
    .container{max-width:1480px;margin:0 auto;padding:28px 40px}
    .filters{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:24px}
    .filter-btn{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:6px 14px;font-size:.78rem;cursor:pointer}
    .filter-btn.active{background:var(--accent);border-color:var(--accent)}
    .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
    .kpi-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;position:relative}
    .kpi-label{font-size:.72rem;color:var(--muted);text-transform:uppercase;font-weight:600}
    .kpi-value{font-size:1.6rem;font-weight:800;margin:6px 0}
    .kpi-sub{font-size:.72rem;color:var(--muted)}
    .charts-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:16px;margin-bottom:16px}
    .chart-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
    .chart-wrap{height:260px;position:relative}
    .table-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:24px}
    .data-table{width:100%;border-collapse:collapse;font-size:.85rem}
    .data-table th{text-align:left;padding:10px;border-bottom:1px solid var(--border);color:var(--muted)}
    .data-table td{padding:10px;border-bottom:1px solid rgba(255,255,255,.05)}
    @media(max-width:900px){.charts-grid{grid-template-columns:1fr}}
  </style>
</head>

function fmt(n){return n.toLocaleString('es',{minimumFractionDigits:2,maximumFractionDigits:2});}
function cc(n){const m=n.match(/\(([A-Z]{2})\)/);return m?m[1]:'??';}

function init(){

  document.getElementById('kpiSuc').textContent = Object.keys(BRANCHES).length + ' sucursales';

  new Chart(document.getElementById('barChart'),{

    data:{labels:sorted.map(([n])=>n.split(' (')[0]), datasets:[{data:sorted.map(([,d])=>d.total_usd),backgroundColor:'#6c63ff'}]},

async function exportPNG(){
  const btn = document.querySelector('.btn-export');
  btn.innerHTML = '⏳...';
  const canvas = await html2canvas(document.body,{scale:2,backgroundColor:'#0d0f1a'});
  const link = document.createElement('a');
  link.download = 'Recaudacion_Portatil.png';
  link.href = canvas.toDataURL();
  link.click();
  btn.innerHTML = '📸 Exportar PNG';
}
